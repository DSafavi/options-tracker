  126: "The comprehensive trading plan for options trading — a written document that governs every aspect of your options activity from strategy selection through position management and review — is developed in this video as the capstone of the Trading Strategies and Spreads section. The trading plan exists for a single purpose: to prevent the combination of market volatility and human psychology from causing you to make decisions in the heat of the moment that your calm, analytical self would not endorse. The plan should cover six areas: universe (which underlyings you will trade and why), strategy selection rules (which strategies you will use in which market conditions), entry criteria (the specific filters that must be met before entering any position), position sizing rules (the maximum risk per trade and per sector and for the total portfolio), management rules (the specific conditions that trigger position adjustments and what those adjustments are), and exit rules (both profit targets and loss limits for each strategy type).\n\nThe process of writing and refining the plan is itself a valuable educational exercise: it forces you to think through every potential scenario before it happens and decide in advance how you will respond, rather than discovering your decision-making process under pressure. The video provides a sample trading plan for a moderate-risk income-focused options trader — covering covered calls, cash-secured puts, and iron condors — with specific parameters for each of the six areas. It then discusses the most common ways that traders deviate from their plans under stress (holding losers too long, adding to losing positions, abandoning a strategy after a losing streak) and how to structure the plan to make those deviations harder to rationalise. The trading plan is a living document that should be updated quarterly as you gain experience, as market conditions change, and as your strategy focus evolves — but every update should be made in a calm analytical state, not in response to a recent losing trade.",

  127: "Advanced order types and execution techniques for multi-leg options trades are covered in this video, addressing the operational skills that allow you to enter and exit complex positions efficiently without giving up significant premium to the spread. For two-leg spreads, the combination order (sometimes called a net debit or net credit order) allows you to specify the total premium you want to pay or receive for both legs simultaneously, with the brokerage executing both legs together as a single transaction. This eliminates leg-in risk — the risk that the first leg fills but the second leg's price moves before it executes — and ensures that your net entry price meets your criteria. For iron condors and other four-leg structures, the same principle applies: place a single four-leg combination order specifying the total net credit you want to receive, and the brokerage's routing system will work to fill all four legs together.\n\nThe video covers the pricing strategy for limit orders on complex positions. Starting at the mid-price of the theoretical spread value is the standard approach — this is the price at which the position should theoretically be executable if the market maker is willing to trade at the middle of their bid-ask spread. In practice, you may need to adjust your limit price $0.05 to $0.10 away from the mid-price to get a fill, particularly for wider-spread options or in fast-moving markets. The rule of thumb is: start at mid, wait 30 to 60 seconds, then adjust toward the market by $0.05 increments until filled. Avoid market orders for all multi-leg positions — the bid-ask spread on each leg compounds, and a four-leg market order can fill at a price 20 to 40 cents worse than the theoretical mid-price. The video also covers the use of GTC (Good Till Cancelled) orders for income trades with specific entry targets, allowing you to place a limit order at your desired price and let the market come to you rather than chasing the fill.",

  128: "Managing options positions through earnings announcements is one of the most consequential position management decisions retail traders face, and this video provides the complete decision framework for every scenario. The three possible positions before an earnings announcement: you have a position that was opened before earnings is an imminent concern (a standard income trade that now has earnings approaching), you have a position specifically designed to capitalise on earnings volatility (an earnings straddle or iron butterfly), or you have no position but are evaluating whether to open one specifically for the earnings event. For each scenario, the decision framework is different.\n\nFor pre-existing positions that were not designed as earnings trades: the key question is whether the current implied volatility has been inflated by earnings uncertainty to a level where your short premium position is carrying significantly more vega risk than when you entered. If the position was entered at 30% IV and IV has risen to 55% in the days before earnings, the position has an unrealised loss from the IV expansion that will be recovered only if the post-earnings IV collapse is larger than the potential move. In this situation, many experienced traders close the position before earnings to avoid the binary risk, even if it means giving up remaining theta income. The rule of thumb: if the position was opened more than 14 days before the earnings date and has already captured 50% or more of the maximum profit, close it before earnings. If the position is less than 50% profitable, evaluate whether the remaining theta income justifies the binary event risk. The video provides a specific scoring system for this evaluation, considering the current delta exposure, the remaining time value, the historical earnings move for the stock, and the current IV relative to the typical post-earnings IV level.",

  129: "Rolling positions for optimal income is a systematic approach to maximising the total premium collected across multiple cycles of the same strategy, treating each roll as a deliberate income optimisation decision rather than a reactive management response. The video establishes the rolling decision framework around three metrics: net credit received, delta reset (how much the new position's delta has been improved relative to the challenged position), and time extension (how much additional theta income has been created by moving to a later expiration). Each roll should improve at least two of the three metrics simultaneously — ideally all three. A roll that moves to a better delta while collecting a net credit and adding 30 more days of theta income is an excellent roll. A roll that collects a small credit but does not improve the delta or extend the time is a marginal roll — it may be worthwhile, but the benefit is much smaller.\n\nThe annualised return optimisation aspect of rolling is what gives this video its distinctive practical value. Rather than evaluating each roll in isolation, the video shows how to calculate the annualised return on capital for a rolling strategy and how to ensure that each rolling decision maintains or improves that annualised return. For example, if a covered call was entered at a 25 DTE with $1.50 premium on a $50 stock (annual return 14.4%), and at 10 DTE the option has decayed to $0.25 with the stock unchanged, rolling to the next month for an additional $1.50 credit adds another 25 days of theta income. The full roll generates $2.75 in income over 35 days on a $50 stock — an annualised rate of 20% — better than the original single-cycle rate. Systematically evaluating rolling decisions in terms of annualised return is the discipline that turns covered call writing from a hobby into a consistent income system.",

  130: "Managing early assignment risk — the possibility that an American-style options counterparty will exercise their option before expiration — is the focus of this video, which covers the specific conditions under which early exercise is rational and how to position yourself to either avoid it or benefit from it. The key insight is that early exercise of call options is almost never rational as long as any time value remains in the option — the holder can always do better by selling the call and buying the stock in the open market than by exercising early. Therefore, early assignment on short calls is rare except in two specific circumstances: the stock is about to pay a dividend that exceeds the remaining time value of the option (making exercise economically rational for the dividend capture), or the option is very deep in the money with minimal time value remaining and the holder prefers stock to the options position.\n\nFor short puts, early assignment is slightly more common in certain market conditions: during periods of high interest rates, it can be economically rational for put holders to exercise early if the interest they can earn on the cash received from the sale exceeds the time value of the put they would otherwise hold. The video provides specific calculations for both scenarios, showing the dividend and interest rate levels at which early exercise becomes economically rational. The practical management implication for covered call writers: if you have a short call with less than $0.05 in time value remaining and a dividend is approaching, evaluate whether to buy back the call before the ex-dividend date to avoid assignment. If the buyback cost is less than the dividend you would lose upon assignment, the buyback is economically justified. This ex-dividend management check — evaluating all short calls in the 5 to 7 days before each underlying's ex-dividend date — is a specific calendar entry that should be part of every covered call writer's routine.",

  131: "Assignment and exercise procedures from the perspective of the options seller — what actually happens operationally when you are assigned, what choices you have, and how to manage the resulting stock position — are the subject of this video. When you are assigned on a short call, 100 shares of the underlying stock are automatically sold from your account at the option's strike price. If you own the shares (covered call), this delivers your existing shares and closes the covered call position. If you do not own the shares (naked call), your account is short 100 shares at the strike price — a position you must manage immediately by either buying shares to close the short or entering an exercise-close request. When you are assigned on a short put, 100 shares are automatically purchased in your account at the strike price, charged against the cash you held as collateral (for a cash-secured put). The resulting long stock position at the assignment price is your new position, which you immediately manage through covered call writing in the wheel strategy.\n\nThe post-assignment decision tree is developed in detail. For call assignment: if you held a covered call and are assigned, you now have cash equal to the strike price from the share sale, plus all the premium income collected during the covered call writing period. The decision is whether to immediately sell a new cash-secured put to re-establish a position in the same stock (re-entering the wheel) or to redeploy the cash to a different opportunity. For put assignment: if you held a cash-secured put and are assigned, you now own stock at the strike price with an effective cost basis reduced by all premium collected. The decision is whether to immediately write a covered call (re-entering the wheel) or to hold the stock without a covered call if you have a bullish thesis that the stock will rally significantly. The video emphasises that both assignment scenarios — for call and put sellers — should be anticipated and planned for before the assignment happens, not decided as a crisis response afterward.",

  132: "The tax implications of options trading in the United States are complex and frequently mishandled by retail traders who are not aware of the specific rules that apply to options positions. This video provides a practical overview of the most important tax considerations: short-term versus long-term capital gains treatment, wash sale rules, Section 1256 contracts, and the specific tax treatment of different assignment scenarios. The most common confusion is around the tax treatment of premium received for selling covered calls: the premium is NOT taxed as income when received but rather as a short-term capital gain when the position is closed (either by the option expiring worthless, by buying back the option, or by assignment). The amount taxed is the net of the premium received minus the cost to close. This timing — the position is recognised for tax purposes when closed, not when premium is received — creates specific year-end management opportunities.\n\nWash sale rules apply to options in ways that can surprise traders who are not careful. If you sell a stock at a loss and then buy a call option on the same stock within 30 days before or after the sale, the wash sale rule disallows the loss for the current tax year. If you buy put options to protect a stock position and the stock declines, the holding period of the stock is reset by the protective put, potentially converting what would have been a long-term gain into a short-term gain if the stock is sold through the put exercise. These interactions between options and wash sale rules create tax planning requirements that should ideally be addressed before the trades are made, not after year-end when the damage is done. The video recommends consulting with a tax professional who specialises in options taxation before developing a systematic trading approach, particularly for accounts with significant capital at stake.",

  133: "Psychology and discipline are the ultimate determinants of options trading success, and this video addresses the specific psychological challenges that are unique to options trading — as distinct from the general market psychology topics that dominate most trading books. The first options-specific challenge is the discomfort with probability: options trading requires being right about process rather than outcome, meaning that you can follow your system perfectly and still lose money on any individual trade, and you can violate your system and still profit. This decoupling of individual outcomes from system quality makes it psychologically harder to maintain discipline than in a simple yes/no framework. The second challenge is assignment anxiety — the disproportionate fear of assignment that leads many covered call and short put writers to buy back their positions at poor prices to avoid the possibility of being assigned, even when assignment would produce a perfectly acceptable or positive outcome.\n\nThe discipline framework the video develops centres on three practices. First, process documentation: after every trade, record not just the outcome but whether the process was followed correctly. Over a sufficient sample, if your win rate tracks the model's prediction, the process is working regardless of recent results. Second, predetermined rules: write down the exact conditions for every management action (rolling, closing, accepting assignment) before you open any position, and commit to following those rules regardless of how you feel about the position's direction. Third, outcome detachment: separate your evaluation of trade quality from the outcome of any individual trade — a trade that was executed in accordance with your rules and lost money is a good trade; a trade that was not executed in accordance with your rules and made money is a bad trade. This last distinction is the hardest to internalise but is the most important psychological shift for long-term trading success.",

  134: "LEAPS options as a long-term investment vehicle are the focus of this video, which evaluates the use of long-dated options as genuine investment tools rather than short-term speculative instruments. The core use case is the LEAPS replacement: instead of buying 100 shares of a stock at the full purchase price, you buy a deep in-the-money LEAPS call at 20 to 30% of that price, achieving similar exposure with dramatically reduced capital. The capital freed up by this substitution can be deployed in Treasury bills or money market funds, earning interest while the LEAPS provides the stock's equity upside. If the stock rises 50% over the two years of the LEAPS, the LEAPS typically gains 60 to 70% in value (due to delta × price change), while the capital freed up has earned 8 to 10% in interest. The total return can approach or exceed what the full stock investment would have earned, but at one-fifth to one-third the capital commitment.\n\nThe risks specific to LEAPS that do not exist in stock ownership are developed with full transparency: time value erosion (even deep ITM LEAPS lose some extrinsic value over their life, though much less than near-term options), the expiration cliff (if the thesis is not fully played out by the expiration date, you must roll the LEAPS — incurring the bid-ask spread cost — or let the position expire), and IV sensitivity (a significant decline in implied volatility erodes LEAPS value even if the stock moves favourably). For these reasons, LEAPS are best suited for situations where the investment thesis has a specific 1 to 2 year horizon, where the stock has moderate IV (preventing excessive time value purchase at inflated premiums), and where the investor is disciplined enough to monitor and roll the position before it enters the final 90 days of its life (when theta decay accelerates meaningfully).",

  135: "Volatility surface analysis — examining how implied volatility varies across strikes and expirations for a given underlying at a specific point in time — is an advanced analytical tool that provides insight into market-implied risk and creates specific options opportunities. The volatility surface is a three-dimensional representation: the x-axis is the option's strike price (or moneyness), the y-axis is the option's expiration date, and the z-axis is the implied volatility. For most equity underlyings, the surface has a characteristic shape: it is not flat (which would imply the Black-Scholes assumption of constant volatility) but rather slopes steeply downward from low strikes to high strikes (the skew or smile), and generally decreases from near-term to long-term expirations (the term structure).\n\nPractical trading applications of volatility surface analysis include: identifying strikes where IV is unusually elevated or depressed relative to the surface's general shape (these outliers represent potential relative value opportunities), understanding how the surface shifts during different market conditions (the surface becomes steeper and more inverted during market stress, creating specific selling opportunities on the high-IV wings), and calibrating strategy selection based on the specific shape of the surface for a given underlying. For example, an underlying with unusually steep skew (very high put IV relative to call IV) favours put-spread credit strategies (where you are selling the high-IV put and buying the lower-IV protective put) over symmetric iron condors. Understanding the volatility surface at this level of detail is what distinguishes a sophisticated options trader who uses the market's information content from one who simply applies standard strategies without adaptation.",

  136: "Volatility arbitrage — the attempt to profit from discrepancies between implied and realised volatility — is one of the most intellectually rigorous applications of options knowledge, and this video explains the theoretical basis and practical limitations of volatility arbitrage strategies. The theoretical framework is straightforward: if implied volatility consistently overestimates realised volatility (which it does, on average, due to the volatility risk premium), then systematically selling options should generate positive returns. This is the foundation of every systematic premium-selling strategy. The more sophisticated version of this idea — true volatility arbitrage — involves delta-hedging the options position to eliminate directional exposure and isolate the volatility premium as the only source of return. By continuously adjusting the stock hedge to keep the net delta at zero, the trader extracts only the difference between the implied volatility at which they sold the option and the realised volatility that subsequently occurs.\n\nThe practical limitations of volatility arbitrage are significant and explain why it remains primarily an institutional activity rather than a retail strategy. First, delta hedging requires constant adjustment — in theory, continuous rebalancing, in practice, very frequent trading that generates substantial transaction costs. Second, the volatility risk premium can invert for extended periods — during genuine market stress, realised volatility regularly exceeds implied volatility, meaning the premium seller is paying a carry cost during the periods when they most need their positions to be profitable. Third, the distribution of volatility returns is fat-tailed — extreme volatility events occur much more frequently than normal distribution models predict, and these events generate large losses that can offset years of volatility premium collection. The video concludes with the practical lesson: the volatility risk premium is real and persistent, but extracting it efficiently and safely requires a risk management framework sophisticated enough to survive the inevitable stress periods when the premium temporarily reverses.",

  137: "Options market making — the activity of continuously providing bid and ask quotes for options on a given underlying and profiting from the bid-ask spread over thousands of transactions — is explained in this video to help retail traders understand the mechanics of the options market from the inside. Market makers are the counterparties on most retail options trades: when you buy a call, a market maker is typically selling it to you; when you sell a put, a market maker is typically buying it from you. Understanding how market makers hedge their positions and generate profit helps you understand why the market prices options the way it does, why bid-ask spreads are wider in some underlyings than others, and how market makers' hedging activity creates specific effects on the underlying stock price.\n\nMarket makers' delta hedging activity creates a specific market dynamic called the 'gamma squeeze' or 'charm-driven selling' that becomes important during periods of high options volume in a specific underlying. When retail traders buy a large quantity of call options on a stock, market makers sell those calls and hedge by buying the underlying stock to offset their short delta. As the stock price rises toward the short call strikes, market makers' delta exposure increases and they must buy more stock to remain hedged — creating a feedback loop between options demand, stock purchases, and further stock price increases. This dynamic was observed dramatically during the GameStop and AMC short squeeze events of early 2021 and has been increasingly studied as a driver of market microstructure in individual stocks with high retail options activity. Understanding this dynamic helps you identify when options-driven mechanics may be temporarily overriding fundamental price dynamics.",

  138: "VIX options and futures — instruments that allow you to directly trade the level of market-implied volatility rather than the directional movement of individual stocks — are introduced in this video as the most direct expression of volatility as an asset class. The VIX itself is not directly tradeable; it is a calculated index. But VIX futures and VIX options allow traders to take positions on where the VIX will be at a future date, with profit and loss determined by how the VIX level moves relative to the futures price or options strike. The VIX term structure — the relationship between VIX futures prices at different expiration dates — contains important information about the market's expectations for volatility: a normal upward-sloping term structure (near-term VIX lower than longer-term VIX futures) reflects the mean-reversion property of volatility; an inverted term structure (near-term VIX higher than longer-term futures) indicates current market stress and the expectation that it will dissipate over time.\n\nThe practical applications of VIX products for retail traders are focused on portfolio hedging rather than speculative volatility trading. Long VIX call options or VIX call spreads are commonly used as tail-risk hedges: they gain value dramatically during market stress events when the VIX spikes, providing offsetting gains to a short-premium portfolio or a long-stock portfolio that is suffering from the volatility spike. The cost of this protection is the premium paid for the VIX calls — typically 1 to 2% of portfolio value annually for a systematic rolling hedge. The video evaluates this cost against the historical benefit: during the 10 major VIX spikes since 2010, long VIX calls have provided average protection equivalent to 15 to 25% of portfolio value in loss prevention. Whether this cost-benefit ratio justifies VIX call purchases depends on portfolio size, risk tolerance, and the cost of alternative hedging structures.",

  139: "Pair trading with options — using options on two correlated securities to construct a position that profits from changes in their relative performance rather than from the absolute direction of either — is the focus of this video. The concept originates in statistical arbitrage: identify two securities that historically trade in a stable relationship (high correlation, mean-reverting spread), and when that relationship temporarily deviates from the historical norm, construct a position that profits from the eventual reversion. The traditional pairs trade uses stock: long the underperforming security and short the outperforming one, structured so that the position has approximately zero net market exposure. Options allow you to implement the same thesis more capital-efficiently and with a defined risk profile.\n\nThe specific options implementation of pairs trading covered in the video uses risk reversals: on the undervalued side of the pair, sell an OTM put and buy an OTM call — creating a bullish position that benefits from upside while collecting put premium to finance the call. On the overvalued side, sell an OTM call and buy an OTM put — creating a bearish position that benefits from downside while collecting call premium to finance the put. The combined position is long the undervalued security (through the risk reversal) and short the overvalued security (through the opposite risk reversal), with approximately zero net delta if constructed symmetrically. The expected value comes from the mean reversion of the pair: if the spread tightens, the bullish side gains more than the bearish side loses, generating net profit. The risk is divergence: if the pair continues to move apart rather than revert, both sides of the position lose value simultaneously.",

  140: "Volatility-of-volatility — the measure of how much implied volatility itself fluctuates over time — is an advanced concept that explains several important options market phenomena that are not captured by first-order volatility analysis. The VIX, while a measure of S&P 500 implied volatility, is itself volatile: it routinely moves 20 to 40% in a single week during market stress and can double or triple within a month. This volatility of the VIX — sometimes called VVIX — measures the expected volatility of the VIX itself over the next 30 days, and it behaves differently from the VIX. During calm markets, VVIX is typically around 80 to 90 (annualised percentage volatility of the VIX itself). During stress events, VVIX can spike above 150, reflecting extreme uncertainty about how volatile the market will become.\n\nFor options traders, understanding VVIX provides a more complete picture of the risk environment than VIX alone. A high VVIX means that the market is pricing in large potential swings in volatility itself — meaning that a current high-VIX environment could get much worse, or that a low-VIX environment could spike suddenly. When VVIX is elevated, options on options (such as VIX options) are more expensive, and the hedging cost of maintaining volatility exposure through VIX products increases. For systematic premium sellers, high VVIX environments warn that the current high-IV conditions could persist or even increase — making the usual 'sell when IV is high' advice more nuanced. The video does not prescribe specific VVIX-based trading rules but provides the conceptual framework for incorporating volatility uncertainty into your risk assessment alongside the direct volatility measures you already use.",

  141: "Quantitative approaches to options strategy — using data analysis, backtesting, and statistical methods to evaluate and optimise options strategies — are introduced in this video as the logical next step beyond rule-of-thumb based trading. The first step in any quantitative approach is backtesting: applying a specific strategy's entry and exit rules to historical options data and measuring the statistical properties of the resulting trade sequence. A well-constructed backtest shows the win rate, the average profit per winning trade, the average loss per losing trade, the maximum drawdown experienced, and the Sharpe ratio (return per unit of volatility). These metrics together give you a complete picture of a strategy's risk-adjusted performance and help you evaluate whether the current rules produce an edge that is large enough to be durable in live trading.\n\nThe limitations of backtesting are as important as its applications. Options backtesting is complicated by several factors not present in simple stock backtesting: the bid-ask spread affects entry and exit prices and must be modelled accurately, options chains change composition over time as new strikes are listed and old ones expire, and the available data for historical options prices is expensive and incomplete for periods before 2005. The video addresses each limitation with specific solutions: use the mid-price of the theoretical spread adjusted by a fixed transaction cost assumption to model entry and exit, focus backtesting on liquid underlyings with long histories (SPY, QQQ, SPX) where options data is available and reliable, and be appropriately skeptical of any strategy that appears to have perfect or near-perfect historical performance — the real world always introduces conditions that the historical data did not include. The quantitative approach is presented as a tool for stress-testing your intuitions and checking whether the parameters you use (such as the 15 to 25 delta range for iron condors) are empirically justified, not as a way to mechanically identify strategies that will continue to work forever.",

  142: "Options for portfolio income — constructing a systematic options program designed to generate consistent monthly income from a primarily stock and bond portfolio — is the practical synthesis of everything covered in the curriculum, presented as an implementation guide for serious retail investors. The framework begins with the income requirement: how much monthly or annual income do you need the options program to generate, and what is the realistic expectation for a well-run premium-selling program? A well-constructed covered call and cash-secured put program, running at IV ranks above 50 with appropriate position sizing, has historically generated 10 to 20% annualised return on the capital deployed in the options strategies — but only when excluding the stock positions, which have their own return profile. For a $500,000 portfolio with $100,000 allocated to options strategies, the options program might realistically target $10,000 to $20,000 in annual income — 2 to 4% of the total portfolio value.\n\nThe implementation sequence for building a systematic income program is covered step by step. First, identify 20 to 30 liquid underlyings with adequate IV history and fundamental quality you are comfortable owning. Second, allocate capital across those underlyings based on position sizing rules (no more than 5 to 10% per underlying). Third, implement a consistent strategy (typically covered calls for existing equity positions, cash-secured puts for new position accumulation, and iron condors for income without directional exposure) with consistent entry parameters. Fourth, establish a management calendar: weekly review of all positions for delta drift and time to expiration; monthly evaluation of the full portfolio for aggregate Greek exposure and capital deployment efficiency. Fifth, track performance in a dedicated options journal that records every trade's entry conditions, management decisions, and exit — providing the data needed to continuously refine the program over time.",

  143: "This capstone video synthesises the complete options curriculum into a unified framework for thinking about options as a versatile tool that serves multiple investment objectives simultaneously — not just a speculative instrument or just an income strategy, but a complete language for expressing investment views with precise risk-reward specifications. The key insight developed in this concluding video is that every investment decision that a traditional stock investor makes implicitly embeds an options position: a stock investor who buys and holds is implicitly long a call with a strike at zero and short gamma on the entire investment (they are fully exposed to all volatility); a cash holder is implicitly long a put on every stock they are not owning (they benefit from declines by having the freedom to buy lower). Making these implicit options positions explicit — and using actual options to manage them deliberately — is what separates an informed investor from one who is unaware of the risk they are taking.\n\nThe final synthesis covers how to sequence your learning and strategy deployment as you become more experienced: start with the most capital-efficient and defined-risk strategies (covered calls and cash-secured puts, then credit spreads and iron condors), build a track record and understand your own risk tolerance before moving to undefined-risk strategies, use the analytics from your trading journal to identify which strategies work best in your hands and which market environments are most favourable for your specific approach. The video closes with the reminder that options mastery is a multi-year journey — the concepts in this curriculum represent the complete theoretical framework, but converting that framework into consistent income and intelligent risk management requires repeated application, honest self-evaluation, and the discipline to follow your rules even when your emotional instincts are pushing you in a different direction. The traders who succeed long-term are not the ones with the most complex strategies but the ones with the most consistent processes."


};

const PASSWORD = 'monkey';
const STORAGE_KEY = 'options_tracker_v1';
const AUTH_KEY = 'options_tracker_auth';

let counts = {};
let activeFilter = 'All';

function loadCounts() {
  try { counts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { counts = {}; }
}

function saveCounts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
}

function showTracker() {
  document.getElementById('password-screen').style.display = 'none';
  document.getElementById('tracker-screen').style.display = 'block';
  init();
}

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    localStorage.setItem(AUTH_KEY, '1');
    showTracker();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password';
    document.getElementById('pw-input').select();
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('tracker-screen').style.display = 'none';
  document.getElementById('password-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-input').focus();
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function getCategories() {
  const seen = new Set();
  return VIDEOS.reduce((acc, v) => {
    if (!seen.has(v.category)) { seen.add(v.category); acc.push(v.category); }
    return acc;
  }, []);
}

function getCatStats(cat) {
  const vids = VIDEOS.filter(v => v.category === cat);
  const watched = vids.filter(v => (counts[v.id] || 0) > 0).length;
  return { total: vids.length, watched };
}

function getOverallStats() {
  const watched = VIDEOS.filter(v => (counts[v.id] || 0) > 0).length;
  return { watched, total: VIDEOS.length };
}

function updateOverall() {
  const { watched, total } = getOverallStats();
  const pct = Math.round((watched / total) * 100);
  document.getElementById('stat-watched').textContent = watched;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-bar-pct').textContent = pct + '%';
}

function updateCatHeader(cat) {
  const { watched, total } = getCatStats(cat);
  const pct = Math.round((watched / total) * 100);
  let block = null;
  document.querySelectorAll('.category-block').forEach(el => {
    if (el.dataset.cat === cat) block = el;
  });
  if (!block) return;
  block.querySelector('.cat-watched-count').textContent = `${watched}/${total}`;
  block.querySelector('.cat-bar').style.width = pct + '%';
  const pctLabel = block.querySelector('.cat-bar-label span');
  if (pctLabel) pctLabel.textContent = pct + '%';
}

function increment(id) {
  counts[id] = (counts[id] || 0) + 1;
  saveCounts();
  renderVideoRow(id);
  const cat = VIDEOS.find(v => v.id === id).category;
  updateCatHeader(cat);
  updateOverall();
}

function decrement(id) {
  if ((counts[id] || 0) > 0) {
    counts[id]--;
    saveCounts();
    renderVideoRow(id);
    const cat = VIDEOS.find(v => v.id === id).category;
    updateCatHeader(cat);
    updateOverall();
  }
}

function renderVideoRow(id) {
  const row = document.querySelector(`[data-vid="${id}"]`);
  if (!row) return;
  const c = counts[id] || 0;
  row.className = 'video-row' + (c === 1 ? ' watched-once' : c > 1 ? ' watched-multi' : '');
  row.querySelector('.watch-count').textContent = c;
  row.querySelector('.watch-count').className = 'watch-count' + (c > 0 ? ' has-views' : '');
}

function buildVideoRow(v) {
  const c = counts[v.id] || 0;
  const borderClass = c === 1 ? ' watched-once' : c > 1 ? ' watched-multi' : '';
  const countClass = c > 0 ? ' has-views' : '';
  const desc = DESCRIPTIONS[v.id] || '';
  const paras = desc ? desc.split('\n\n').map(p => `<p>${p}</p>`).join('') : '';
  const hasDesc = paras.length > 0;
  const num = v.id + 1;
  return `
    <div class="video-row${borderClass}" data-vid="${v.id}">
      <span class="video-num">${num}.</span>
      <div class="video-title">
        ${v.url
          ? `<a href="${v.url}" target="_blank" rel="noopener">${v.title}</a>`
          : v.title}
      </div>
      ${hasDesc ? `<button class="desc-toggle" onclick="toggleDesc(${v.id})">what's covered ↓</button>` : ''}
      <span class="watch-count${countClass}">${c}</span>
      <button class="btn-decrement" onclick="decrement(${v.id})" title="Undo">−</button>
      <button class="btn-increment" onclick="increment(${v.id})" title="Mark watched">+</button>
    </div>
    ${hasDesc ? `<div class="video-desc" id="desc-${v.id}">${paras}</div>` : ''}`;
}

const CAT_LETTERS = 'ABCDEFGHIJK';

function buildCategoryBlock(cat, catIndex) {
  const { watched, total } = getCatStats(cat);
  const pct = Math.round((watched / total) * 100);
  const videos = VIDEOS.filter(v => v.category === cat);
  const letter = CAT_LETTERS[catIndex] || '';
  return `
    <div class="category-block" data-cat="${cat}">
      <div class="category-header" onclick="toggleCat(this)">
        <span class="cat-chevron">▶</span>
        <span class="cat-letter">${letter}</span>
        <span class="cat-name">${cat}</span>
        <div class="cat-progress-wrap">
          <div class="cat-bar-label">
            <span>${pct}%</span>
          </div>
          <div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%"></div></div>
        </div>
        <span class="cat-watched-count">${watched}/${total}</span>
      </div>
      <div class="video-list">
        ${videos.map(buildVideoRow).join('')}
      </div>
    </div>`;
}

function toggleCat(header) {
  header.parentElement.classList.toggle('open');
}

function buildFilters(categories) {
  const row = document.getElementById('filter-row');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'All';
  all.onclick = () => setFilter('All');
  row.appendChild(all);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => setFilter(cat);
    row.appendChild(btn);
  });
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  document.querySelectorAll('.category-block').forEach(block => {
    block.style.display = (cat === 'All' || block.dataset.cat === cat) ? '' : 'none';
  });
}

function toggleDesc(id) {
  const panel = document.getElementById('desc-' + id);
  const btn = document.querySelector(`[data-vid="${id}"] .desc-toggle`);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  if (btn) { btn.classList.toggle('open', open); btn.textContent = open ? "what's covered ↑" : "what's covered ↓"; }
}

function confirmReset() {
  if (confirm('Reset all watch counts? This cannot be undone.')) {
    counts = {};
    saveCounts();
    document.querySelectorAll('.video-row').forEach(row => {
      const id = parseInt(row.dataset.vid);
      renderVideoRow(id);
    });
    getCategories().forEach(updateCatHeader);
    updateOverall();
  }
}

function init() {
  loadCounts();
  const categories = getCategories();
  document.getElementById('filter-row').innerHTML = '';
  buildFilters(categories);
  const content = document.getElementById('content');
  content.innerHTML = categories.map((cat, i) => buildCategoryBlock(cat, i)).join('');
  updateOverall();
}

// Auto-login if previously authenticated — must be after all const declarations
if (localStorage.getItem(AUTH_KEY) === '1') {
  showTracker();
}
</script>
</body>
</html>
