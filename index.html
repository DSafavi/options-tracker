<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Video Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── PASSWORD SCREEN ── */
  #password-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }

  #password-screen h1 {
    font-size: 28px;
    font-weight: 700;
    color: #ffd700;
    letter-spacing: 1px;
  }

  #password-screen p {
    color: #888;
    font-size: 14px;
  }

  .pw-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 36px 48px;
  }

  #pw-input {
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 16px;
    padding: 12px 16px;
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  #pw-input:focus { border-color: #ffd700; }

  #pw-error {
    color: #ff4d4d;
    font-size: 13px;
    height: 18px;
  }

  .btn-primary {
    background: #ffd700;
    border: none;
    border-radius: 8px;
    color: #0d0d0d;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 32px;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
  }

  .btn-primary:hover { background: #ffe033; }
  .btn-primary:active { transform: scale(0.97); }

  /* ── TRACKER SCREEN ── */
  #tracker-screen { display: none; }

  .header {
    background: #111;
    border-bottom: 1px solid #1f1f1f;
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #ffd700;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    text-align: right;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #ffd700;
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .overall-bar-wrap {
    background: #1f1f1f;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .overall-bar {
    background: #ffd700;
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #555;
    margin-bottom: 5px;
  }

  /* Filter row */
  .filter-row {
    padding: 16px 32px 0;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    color: #888;
    cursor: pointer;
    font-size: 12px;
    padding: 5px 14px;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: #ffd700; color: #ffd700; }
  .filter-btn.active { background: #ffd700; border-color: #ffd700; color: #0d0d0d; font-weight: 600; }

  /* ── CONTENT ── */
  .content { padding: 24px 32px 60px; }

  .category-block {
    margin-bottom: 12px;
    border: 1px solid #1f1f1f;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .category-block:hover { border-color: #2a2a2a; }

  .category-header {
    align-items: center;
    background: #141414;
    cursor: pointer;
    display: flex;
    gap: 12px;
    padding: 14px 20px;
    user-select: none;
    transition: background 0.15s;
  }

  .category-header:hover { background: #1a1a1a; }

  .cat-chevron {
    color: #444;
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .category-block.open .cat-chevron { transform: rotate(90deg); }

  .cat-name {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    color: #e8e8e8;
  }

  .cat-progress-wrap {
    flex: 0 0 140px;
  }

  .cat-bar-bg {
    background: #222;
    border-radius: 3px;
    height: 4px;
    margin-top: 5px;
    overflow: hidden;
  }

  .cat-bar {
    background: #ffd700;
    border-radius: 3px;
    height: 100%;
    transition: width 0.3s ease;
  }

  .cat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #555;
  }

  .cat-watched-count {
    color: #ffd700;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    min-width: 52px;
    text-align: right;
  }

  /* Video list */
  .video-list {
    display: none;
    border-top: 1px solid #1f1f1f;
  }

  .category-block.open .video-list { display: block; }

  .video-row {
    align-items: center;
    border-bottom: 1px solid #161616;
    display: flex;
    gap: 12px;
    padding: 11px 20px;
    transition: background 0.12s;
  }

  .video-row:last-child { border-bottom: none; }
  .video-row:hover { background: #111; }

  .video-row.watched-once { border-left: 2px solid #ffd700; }
  .video-row.watched-multi { border-left: 2px solid #ff9900; }

  .video-num {
    color: #444;
    font-size: 11px;
    font-weight: 600;
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  .cat-letter {
    background: #ffd700;
    border-radius: 6px;
    color: #0d0d0d;
    font-size: 13px;
    font-weight: 800;
    height: 26px;
    line-height: 26px;
    min-width: 26px;
    text-align: center;
    flex-shrink: 0;
  }

  .video-title {
    flex: 1;
    font-size: 13px;
    color: #ccc;
    line-height: 1.4;
  }

  .video-title a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }

  .video-title a:hover { color: #ffd700; }

  .watch-count {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #888;
    font-size: 12px;
    font-weight: 600;
    min-width: 28px;
    padding: 3px 8px;
    text-align: center;
  }

  .watch-count.has-views {
    background: #1f1a00;
    border-color: #4a3800;
    color: #ffd700;
  }

  .btn-increment {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #ffd700;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    height: 30px;
    line-height: 1;
    transition: all 0.12s;
    width: 30px;
    flex-shrink: 0;
  }

  .btn-increment:hover {
    background: #ffd700;
    border-color: #ffd700;
    color: #0d0d0d;
  }

  .btn-increment:active { transform: scale(0.9); }

  .btn-decrement {
    background: transparent;
    border: none;
    border-radius: 4px;
    color: #333;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 5px;
    transition: color 0.12s;
  }

  .btn-decrement:hover { color: #ff4d4d; }

  /* Reset button */
  .reset-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #444;
    cursor: pointer;
    font-size: 12px;
    padding: 5px 12px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .reset-btn:hover { border-color: #ff4d4d; color: #ff4d4d; }

  .logout-btn {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #444;
    cursor: pointer;
    font-size: 11px;
    padding: 5px 10px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .logout-btn:hover { border-color: #ffd700; color: #ffd700; }

  /* ── DESCRIPTION PANEL ── */
  .video-desc {
    display: none;
    background: #0f0f0f;
    border-top: 1px solid #1a1a1a;
    color: #999;
    font-size: 12px;
    line-height: 1.7;
    padding: 12px 20px 14px;
  }

  .video-desc.open { display: block; }

  .video-desc p + p { margin-top: 8px; }

  .desc-toggle {
    background: #252525;
    border: 1px solid #555;
    border-radius: 20px;
    color: #ddd;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 5px 14px;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
    line-height: 1.4;
  }

  .desc-toggle:hover { border-color: #ffd700; color: #ffd700; background: #1f1a00; }
  .desc-toggle.open { border-color: #ffd700; color: #ffd700; background: #1f1a00; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .pw-box { padding: 28px 24px; width: 90vw; }
    #pw-input { width: 100%; }

    .header { padding: 14px 16px; }

    .header-top { flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 17px; }

    .header-stats { gap: 14px; }
    .stat-value { font-size: 18px; }
    .stat-label { font-size: 10px; }

    .filter-row { padding: 12px 16px 0; gap: 8px; }
    .filter-btn { font-size: 11px; padding: 4px 10px; }

    .content { padding: 16px 12px 60px; }

    .category-header { padding: 12px 14px; gap: 8px; }
    .cat-name { font-size: 13px; }
    .cat-progress-wrap { flex: 0 0 90px; }
    .cat-watched-count { font-size: 12px; min-width: 40px; }

    .video-row { padding: 10px 14px; gap: 8px; }
    .video-title { font-size: 12px; }
    .watch-count { min-width: 24px; padding: 3px 6px; font-size: 11px; }
    .btn-increment { width: 28px; height: 28px; font-size: 15px; }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
  <div class="pw-box">
    <h1>Options Tracker</h1>
    <p>Enter password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autofocus>
    <div id="pw-error"></div>
    <button class="btn-primary" onclick="checkPassword()">Enter</button>
  </div>
</div>

<!-- TRACKER SCREEN -->
<div id="tracker-screen">
  <div class="header">
    <div class="header-top">
      <h1>Options Video Tracker</h1>
      <div class="header-stats">
        <div class="stat">
          <div class="stat-value" id="stat-watched">0</div>
          <div class="stat-label">Watched</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-total">144</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-pct">0%</div>
          <div class="stat-label">Complete</div>
        </div>
        <button class="reset-btn" onclick="confirmReset()">Reset All</button>
        <button class="logout-btn" onclick="logout()">Log Out</button>
      </div>
    </div>
    <div class="bar-label">
      <span>Overall progress</span>
      <span id="overall-bar-pct">0%</span>
    </div>
    <div class="overall-bar-wrap">
      <div class="overall-bar" id="overall-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="filter-row" id="filter-row"></div>

  <div class="content" id="content"></div>
</div>

const DESCRIPTIONS_OLD_REPLACED = {
  0: "Options are contracts that give the buyer the right — but not the obligation — to buy or sell an underlying asset at a specified price before a certain date. This video walks through that foundational idea, distinguishing calls (right to buy) from puts (right to sell), and explaining why traders use options instead of simply buying or selling stock directly.\n\nThe video covers the key parties in every options trade: the buyer who pays a premium for the right, and the seller (writer) who collects that premium and takes on the obligation. It explains intrinsic value, expiration dates, and strike prices using concrete examples so you can immediately apply the vocabulary to a real options chain.",
  1: "This video revisits the core mechanics of options from the ground up, ideal for cementing your understanding after an initial introduction. It covers how a call option profits when the underlying stock rises above the strike price, and how a put option gains value when the stock falls below it — with worked dollar examples throughout.\n\nParticular emphasis is placed on the asymmetric risk profile: buyers have limited downside (the premium paid) and theoretically unlimited upside, while sellers collect income but face substantial risk if the market moves against them. By the end you should be comfortable explaining what it means to be long or short an option.",
  2: "A third entry-level walkthrough of options fundamentals, this video approaches the topic from the perspective of an investor already familiar with stocks who wants to understand why options exist and what problem they solve. It frames options as tools for both speculation and risk management — two very different use cases with very different risk profiles.\n\nThe video is useful for reinforcing the difference between American-style options (exercisable any time before expiry) and European-style (exercisable only at expiry), and for understanding what happens at expiration: in-the-money options are typically exercised or auto-assigned, while out-of-the-money options expire worthless.",
  3: "Options have their own vocabulary, and this video is a glossary-style deep dive into the terminology you'll encounter every time you look at a chain. It covers premium, strike price, expiration date, in-the-money (ITM), at-the-money (ATM), and out-of-the-money (OTM), and explains how each concept relates to the others in practice.\n\nThe video also introduces time value versus intrinsic value — the two components that make up every option's price. Understanding that an ITM option has both components while an OTM option has only time value is critical for interpreting why options are priced the way they are and how that price changes as the stock moves.",
  4: "This video lays out the core conceptual building blocks of options trading: leverage, hedging, and income generation. Rather than just defining terms, it explains the economic logic behind why options markets exist — they allow market participants to transfer and redistribute risk in ways that straight stock ownership cannot.\n\nIt walks through real-world scenarios for each use case: a speculator buying calls to gain leveraged upside on an earnings announcement; a long-term investor buying puts to insure a stock position against a downturn; and a stockholder selling covered calls to generate monthly income. These three scenarios recur constantly throughout the rest of the curriculum.",
  5: "A comprehensive terminology reference video that goes beyond basics to cover assignment, exercise, open interest, and volume — terms that become critical when you move from theory to actual trading. The video clarifies the often-confused distinction between open interest (total outstanding contracts) and volume (contracts traded today), and why both matter when assessing liquidity.\n\nIt also covers the concept of early exercise for American options and why it's rarely optimal for calls (except around ex-dividend dates), setting up the intuition you'll need later when studying put-call parity and pricing models. The Q&A format makes it easy to test your own understanding as you watch.",
  6: "This video distils options knowledge into eight must-know concepts for anyone starting out: the right vs. obligation distinction, premium, strike price, expiration, moneyness, intrinsic vs. time value, the Greeks at a high level, and the risk/reward asymmetry between buyers and sellers. Each concept is explained briefly but clearly enough to use immediately.\n\nThe value of this video is its density — it's designed to function as a pre-flight checklist before you start trading. Watching it after completing a few other foundational videos is a good way to identify any gaps in your understanding and ensure you have a coherent mental model before moving into pricing and strategy.",
  7: "Oriented toward investors (rather than traders), this video connects options concepts to portfolio management goals: how options can replace, complement, or hedge existing equity positions. It explains why a long-term investor might use options to reduce cost basis on a stock they want to own, or to generate income on a position they're happy to hold indefinitely.\n\nThe video introduces the concept of options as an investment vehicle with defined risk parameters, contrasting this with the perception of options as purely speculative instruments. It's particularly useful for understanding how covered calls and cash-secured puts fit into a conservative, income-oriented investment strategy.",
  8: "This video walks through the fundamentals an investor must grasp before placing their first options trade: how to read a basic chain, what the bid-ask spread means for your fill price, and why liquidity matters when selecting strikes and expirations. It covers the practical mechanics of entering and exiting a position, not just the theory.\n\nIt also addresses position sizing and the fact that one options contract represents 100 shares — a point that surprises new traders when they calculate actual dollar exposure. Understanding leverage and dollar risk upfront prevents the most common and costly beginner mistakes.",
  9: "A clean, structured beginner introduction that uses an analogy-first approach to make options intuitive before introducing formal terminology. The call option is framed as a deposit on a house — you pay a small amount now to lock in the right to buy at today's price, but you're not obligated to complete the purchase if circumstances change.\n\nFrom that analogy the video builds outward to cover puts, premiums, strike prices, and expirations with worked numerical examples. It closes with a discussion of the four basic positions (long call, long put, short call, short put) and the profit/loss profile of each, giving you a complete map of the options landscape before you dive deeper.",
  10: "This beginner-focused video concentrates on the mechanics of buying and selling options contracts through a brokerage, covering the practical steps that theory videos often skip: how to select the right expiration, how to choose between strikes, and how to read the bid-ask spread before placing an order. It treats the brokerage platform as a key part of the learning process.\n\nThe video also explains why most options traders never actually exercise their contracts — instead, they close positions by selling the contract back into the market. This distinction between exercising and selling to close is fundamental and often misunderstood by beginners who assume exercise is the natural end of every trade.",
  11: "This video breaks down the different types of options (calls and puts), how contracts are standardised (100 shares per contract, monthly and weekly expirations, standardised strikes), and what the contract specification means for how you trade. It explains the role of the Options Clearing Corporation (OCC) as the counterparty to every trade, which eliminates counterparty risk.\n\nThe segment on contract types extends to index options, ETF options, and equity options — explaining the key differences in settlement (cash vs. physical delivery) and exercise style (European vs. American). Knowing these distinctions prevents expensive mistakes when trading index products like SPX or XSP.",
  12: "Starting from the question 'what actually happens when you buy a call?', this video traces an options trade from entry to expiration, explaining how the price of the contract changes as the stock moves, time passes, and volatility shifts. It introduces the Greeks conceptually — delta, theta, vega — without getting mathematical, so you can see why option prices behave the way they do.\n\nThe terminology section is particularly thorough, covering moneyness categories in depth: deep ITM options behave like stock, ATM options have maximum time value, and OTM options are pure time value bets. This three-way classification is the foundation of strike selection strategy, which features heavily in later videos.",
  13: "Structured as a Q&A session, this video addresses the questions most frequently asked by new options traders: Can I lose more than I invested? What happens if I forget to close a position at expiration? How do I know if an option is fairly priced? The format makes it easy to find answers to the specific worries you have without wading through a full lecture.\n\nAmong the most valuable answers: the explanation of what happens to in-the-money long options at expiration (automatic exercise, which can result in unexpected stock assignment), and how to avoid being short an option that gets exercised against you over a weekend. These operational details are absent from most theory-focused videos but matter enormously in practice.",
  14: "Options quotes and chains are the primary interface between you and the options market, and this video teaches you to read them fluently. It walks through a live options chain showing bid, ask, last price, volume, open interest, implied volatility, and the Greeks for each strike — explaining what each column means and how to use it to make decisions.\n\nThe video emphasises that the bid-ask spread in options is often much wider than in stocks, and teaches you how to estimate a fair mid-price and place limit orders rather than hitting the market. Getting good fills requires understanding the chain's structure, and this video gives you that foundation before you start trading live.",
  15: "Options symbols follow a standardised format (OCC symbology) that encodes the underlying ticker, expiration date, option type, and strike price into a single string — and this video decodes that format so you can interpret any option symbol you encounter. Understanding the symbol prevents confusion when reading brokerage statements or discussing positions with other traders.\n\nThe second half of the video focuses on how to navigate an options chain as a beginner: how to filter by expiration, how to identify liquid strikes by open interest, and how to use the chain to construct a trade thesis. It bridges the gap between understanding what an option is and actually being able to find and evaluate one on a brokerage platform.",
  16: "This video is a suitability assessment for options trading — it honestly examines who options are and aren't appropriate for, based on investment goals, time horizon, risk tolerance, and the amount of active management you're willing to commit. Not everyone who trades stocks should trade options, and this video helps you make that decision clearly.\n\nIt covers the regulatory requirements (options agreements, approval levels) and explains why brokerages require you to answer questions before granting access. The approval levels (1 through 4) correspond to increasingly complex and risky strategies, and the video explains what each level allows so you know what to apply for and why.",
  17: "This video maps out the different ways an investor can get options exposure: buying single options outright, selling covered calls against existing stock, using spread strategies to define risk, and accessing options through structured products. Each approach has a different risk profile, capital requirement, and complexity level.\n\nThe video is particularly useful for understanding that options strategies exist on a spectrum from conservative (covered calls, cash-secured puts) to aggressive (naked options, complex multi-leg spreads). Knowing where on that spectrum you want to operate helps you focus your learning on the strategies that match your goals and risk tolerance.",
  18: "Options pricing is driven by several inputs, and this video introduces the foundational model: Black-Scholes. It explains the five inputs (stock price, strike price, time to expiration, risk-free rate, and implied volatility) and shows directionally how changing each one affects the option's theoretical price. The goal isn't to derive the formula but to build the intuition.\n\nThe video also introduces the concept of theoretical value versus market price, and what it means when an option is 'cheap' or 'expensive' relative to its theoretical value. This comparison — driven primarily by implied volatility — is the backbone of professional options trading and sets up the volatility curriculum that comes later.",
  19: "This video digs into what actually determines the price of an option from first principles — starting with the idea that an option is worth something because it creates optionality, and optionality has value. It explains intrinsic value (the in-the-money amount) and extrinsic value (time value + volatility premium) as the two building blocks of every option price.\n\nThe discussion of extrinsic value is particularly valuable: it explains why OTM options still have positive value even though they have no intrinsic value, and why that extrinsic value decays to zero at expiration. This is the foundation for understanding theta decay, covered call writing, and any strategy that profits from the passage of time.",
  20: "Starting with the arbitrage-free pricing concept, this video explains that options prices are set so that no riskless profit is possible — meaning the market's pricing of an option must be consistent with current stock prices, interest rates, and expectations about future volatility. Any deviation creates an arbitrage opportunity that professionals quickly eliminate.\n\nThe video walks through the put-call parity relationship informally, showing that the price of a call and a put at the same strike and expiration are mathematically linked. Violating that relationship creates a synthetic arbitrage. Understanding this linkage helps you identify when the market is mispricing one side relative to the other.",
  21: "This video introduces the Black-Scholes model more formally, explaining the inputs and outputs and showing how to calculate a theoretical option price using the model's framework. It demystifies the 'd1' and 'd2' terms by explaining them intuitively as probability-weighted measures of whether the option will finish in the money.\n\nThe practical takeaway is understanding implied volatility as the 'plug' variable: the market doesn't use Black-Scholes to set prices, but you can reverse-engineer the model to find the volatility implied by current prices. That implied volatility number becomes the single most important metric for evaluating whether an option is cheap or expensive.",
  22: "A comprehensive walkthrough of options pricing that covers all the major factors — underlying price, strike selection, days to expiration, implied volatility, interest rates, and dividends — and shows how each affects call and put prices differently. The video uses charts and tables to make the relationships visual rather than purely algebraic.\n\nParticular time is spent on the non-linear relationship between stock price moves and option price moves (explained later through delta and gamma), and on the accelerating rate of time decay as expiration approaches. Both of these dynamics are central to timing options trades correctly and choosing the right expiration.",
  23: "This video integrates pricing models and the Greeks into a single framework, showing that the Greeks are simply the partial derivatives of the Black-Scholes formula with respect to each input. Delta measures sensitivity to price, vega to volatility, theta to time, and rho to interest rates — and each Greek tells you exactly how much the option's value changes for a small move in that input.\n\nThe practical value is learning to use the Greeks as a real-time dashboard for your position: delta tells you your directional exposure, theta tells you how much you're losing per day to time decay, and vega tells you how sensitive you are to a change in implied volatility. Managing these three exposures is the core skill of professional options trading.",
  24: "This video surveys the landscape of option pricing models — Black-Scholes, the Binomial model, and Monte Carlo simulation — explaining the assumptions and limitations of each. Black-Scholes assumes constant volatility and log-normal returns; the Binomial model is more flexible but computationally intensive; Monte Carlo handles complex path-dependent options.\n\nFor a practitioner, the key insight is that no model is perfectly accurate — they all make simplifying assumptions. The skill is knowing which model to use for which product (equity options, barrier options, Asian options) and understanding where the model breaks down so you can adjust your risk management accordingly.",
  25: "This deep-dive video examines each factor that influences option pricing — stock price, strike, expiration, implied volatility, dividends, and interest rates — with worked examples showing the dollar impact of changes in each. It's designed to help you predict how an option's price will move before you trade, not just after.\n\nThe video pays special attention to the 'volatility premium' — the tendency for implied volatility to exceed realised volatility over time, which is why selling options has a structural edge. Understanding why this premium exists, how large it typically is, and when it disappears is foundational for building an income-generating options strategy.",
  26: "A practical pricing reference video that catalogues the factors you should check before entering any options trade: current implied volatility versus historical volatility, how far the strike is from the current price, how many days remain to expiration, and whether there are upcoming events (earnings, dividends, Fed meetings) that could spike volatility.\n\nThe video introduces the concept of 'implied move' — the market's expectation of how far a stock will move by expiration, derived from the straddle price. Comparing the implied move to your own forecast is a key part of evaluating whether an option trade offers good value for the risk being taken.",
  27: "Dividends have a direct mechanical effect on options prices because stocks drop by approximately the dividend amount on the ex-dividend date. This video explains exactly how that affects calls and puts: calls lose value and puts gain value when a dividend is announced or approaches, all else being equal.\n\nThe video also covers the early exercise logic for deep in-the-money calls on dividend-paying stocks — one of the few situations where early exercise of a call can be rational — and explains why options traders need to track ex-dividend dates and adjust their strategies accordingly. Overlooking dividends is a common source of unexpected losses for beginners.",
  28: "Put-call parity is one of the most fundamental relationships in all of options theory: for European options on a non-dividend-paying stock, the price of a call minus a put at the same strike and expiration equals the forward price of the stock minus the present value of the strike. This video derives and explains that relationship and shows what happens when it's violated.\n\nThe practical applications covered include synthetic positions: you can replicate a call using a put plus stock (or vice versa), and you can construct a synthetic forward using options. Understanding synthetics helps you find cheaper ways to express a trade idea and explains why options market makers can hedge their books so efficiently.",
  29: "Delta and gamma are the two most important Greeks for directional traders, and this video covers them in depth. Delta measures how much the option price moves for a one-dollar move in the underlying — a 0.50 delta call gains $0.50 if the stock rises $1. Gamma measures how fast delta itself is changing, which tells you how quickly your directional exposure is shifting as the stock moves.\n\nThe video explains delta as an approximate probability of expiring in the money, which is useful for strike selection: a 30-delta option has roughly a 30% chance of finishing ITM. Gamma is highest for ATM options near expiration — a property that makes short gamma positions especially risky heading into expiry, and explains why experienced traders reduce short ATM positions before expiration.",
  30: "Vega, rho, and the second-order Greeks (vanna, charm, vomma) are covered in this video. Vega measures the sensitivity of an option's price to a one-point change in implied volatility — long options have positive vega (they gain when IV rises) and short options have negative vega. For most retail traders, managing vega exposure is more important than managing rho.\n\nThe second-order Greeks covered — vanna (delta's sensitivity to volatility) and charm (delta's sensitivity to time) — matter most for longer-dated positions and for anyone running a delta-hedged book. While most retail traders don't need to track these daily, understanding them helps you anticipate how your delta will shift as market conditions change, especially around volatility events.",
  31: "This video focuses specifically on theta, vega, and rho — the three Greeks most relevant to options sellers and income traders. Theta represents the daily dollar amount an option loses to time decay; it works in the seller's favour and against the buyer. Understanding the rate and shape of theta decay (non-linear, accelerating near expiration) is essential for managing covered calls, short puts, and credit spreads.\n\nVega and rho complete the picture of how options prices respond to volatility and interest rate changes. The video emphasises that for most retail traders, rho (interest rate sensitivity) is small enough to ignore, while vega is a major driver of P&L especially in the first few weeks of a trade. Balancing theta income against vega risk is the central challenge of selling premium.",
  32: "Delta and gamma are given a full video treatment here, with detailed charts showing how delta changes across different strikes and expirations, and how gamma behaves for ITM, ATM, and OTM options. The core insight is that gamma is highest for ATM options near expiration, creating explosive delta changes in the final days of a contract's life.\n\nThe video explains delta hedging — the practice of buying or selling stock to neutralise a position's delta — and shows why it requires continuous adjustment as gamma causes delta to drift. This is fundamental to understanding how market makers manage options books and why they price ATM options near expiration the way they do.",
  33: "This companion video to the delta/gamma discussion covers the remaining Greeks in the same systematic way. Theta decay charts for ATM options show the characteristic hockey-stick shape that accelerates in the last 30 days — which is why most premium sellers focus on 30-45 DTE positions. Vega charts show that longer-dated options are more sensitive to volatility changes.\n\nRho's impact is demonstrated with interest rate scenarios, showing that it matters more for LEAPS (long-dated options) than for near-term options. The video closes with a framework for thinking about which Greeks dominate your P&L at different stages of a trade's life, giving you a practical lens for monitoring positions after entry.",
  34: "This video demystifies the Greeks by stripping away the mathematics and focusing entirely on intuition. Each Greek is explained through the lens of 'what am I rooting for?' — as a long call holder, you want high delta, low theta, high vega, and high gamma near your strike. As a premium seller, you want the opposite on most of them.\n\nThe key contribution is a unified framework: you can describe any options position by its Greek profile, and that profile tells you exactly what market conditions will help or hurt you. This 'Greek dashboard' approach is the mental model that separates traders who understand why their positions make or lose money from those who are just guessing.",
  35: "A comprehensive Greeks reference video that covers all five major Greeks (delta, gamma, theta, vega, rho) in a single session, explaining how they interact with each other and how they shift over the life of a trade. The video uses position-level examples rather than isolated Greek definitions, making it easier to see how the Greeks combine in practice.\n\nThe video is particularly useful for understanding how the Greeks change as an option moves from OTM to ATM to ITM — a journey that every successful long options trade makes. Knowing that delta increases while gamma peaks at ATM, then decreases as the option goes deep ITM, helps you manage the transition from speculative position to near-stock-equivalent position.",
  36: "Going beyond the basic five Greeks, this video covers the higher-order Greeks used by sophisticated traders to manage complex books. Vanna (how delta changes with volatility) explains why implied volatility spikes often cause sharp moves in delta-hedged positions. Charm (how delta changes with time) explains why overnight risk is different from intraday risk for short options.\n\nThe video frames these advanced Greeks not as academic curiosities but as practical tools for anticipating how your position will behave in scenarios that the first-order Greeks don't capture well — particularly in the final weeks of a contract's life and during volatility regime changes. For anyone moving beyond basic strategies, these concepts are the next level of precision.",
  37: "This video provides the most complete treatment of all five Greeks in the curriculum, walking through delta, gamma, theta, vega, and rho with detailed numerical examples and position-level case studies. Each Greek is introduced, defined, and then applied to a real trade scenario showing how it influences your entry, management, and exit decisions.\n\nThe video closes with a Greeks-based checklist for evaluating any options trade before you enter it: check delta for directional bias, theta for income or decay cost, vega for volatility exposure, and gamma for how much your risk profile will shift if the stock moves. Running through this checklist consistently is a hallmark of disciplined options trading.",
  38: "A special event presentation that teaches the Greeks without using a single mathematical formula — relying entirely on diagrams, analogies, and real-world examples. This makes it the most accessible Greeks introduction in the curriculum, particularly valuable if the mathematical notation in other videos has been a barrier to understanding.\n\nThe event format includes live questions from the audience, which surfaces a range of practical concerns: how do you manage a position when multiple Greeks are working against you simultaneously? When does vega matter more than theta? The answers given in real-time make this one of the most practically useful videos in the Greek section.",
  39: "Volatility is the single most important concept in options pricing, and this video introduces both its forms — historical volatility (what the stock has actually done) and implied volatility (what the options market expects it to do). The gap between the two is where trading opportunities are found, and the video builds the intuition for how to identify and use that gap.\n\nThe video covers the volatility cone — a tool that shows the range of historical volatility at different time horizons — and explains why implied volatility tends to trade above historical volatility on average, creating the 'volatility premium' that options sellers harvest. Understanding the structural source of this premium is the foundation of every income-generating options strategy.",
  40: "A second video on volatility concepts for options investors, this one going deeper into how implied volatility is derived from options prices and how to interpret the VIX as a market-wide measure of expected volatility. It explains why the VIX is calculated from near-term SPX options and what changes in the VIX signal about market sentiment.\n\nThe video covers volatility mean reversion — the empirical tendency for implied volatility to return to its historical average after spikes — and explains how options sellers use this property to time entries. High IV environments are generally better for selling premium; low IV environments favour buying options. This simple framework guides strategy selection across all market conditions.",
  41: "This video directly connects volatility to the practical challenge of options trading: when IV is high, options are expensive (good for sellers, bad for buyers) and when IV is low, options are cheap (good for buyers, bad for sellers). It builds a mental model for evaluating the 'volatility environment' before deciding which type of strategy to deploy.\n\nThe video introduces IV percentile and IV rank as tools for contextualising current implied volatility: a 40% IV that's in the 90th percentile of its one-year range is very different from a 40% IV that's at the 10th percentile. These metrics — which most trading platforms display — allow you to quickly assess whether you're buying cheap or selling expensive in any given name.",
  42: "This video is a deep dive into implied volatility specifically, tracing exactly how it's derived from options prices using the Black-Scholes model in reverse. It explains why vega and IV are tightly linked, and how a one-point rise in implied volatility translates into a specific dollar change in an option's value depending on the option's vega.\n\nThe video also introduces the volatility surface — the matrix of implied volatilities across all strikes and expirations — and explains why IV is not constant across the surface. The volatility smile and skew patterns visible on the surface encode the market's assessment of tail risk, and understanding them is essential for anyone trading spreads or selling options systematically.",
  43: "Volatility skew is one of the most important and least understood features of the options market, and this video explains it clearly. Skew refers to the fact that OTM puts on stocks and equity indexes typically have higher implied volatility than OTM calls — reflecting the market's asymmetric fear of sharp downside moves versus gradual upside moves.\n\nThe video explains the mechanics of skew (supply/demand for portfolio insurance drives up put IV), how to read skew on an options chain, and how to trade it. Strategies like put spreads benefit from positive skew while risk reversals let you sell expensive puts and buy cheaper calls. Skew awareness is fundamental to pricing any multi-leg strategy accurately.",
  44: "This video frames volatility as the fuel that drives options prices and market moves, explaining the feedback loop between stock price moves, options demand, and implied volatility changes. When stocks fall sharply, demand for protective puts surges, driving IV higher — which in turn makes all options more expensive, changing the cost of every hedging and income strategy.\n\nThe video introduces the concept of volatility regimes: low-volatility bull markets where premium selling thrives, and high-volatility bear markets where buying protection is expensive but necessary. Knowing which regime you're in — and how regimes transition — is as important as knowing how to execute individual strategies.",
  45: "This video focuses on the practical management of volatility exposure across a portfolio of options positions. When implied volatility spikes unexpectedly, long premium positions gain and short premium positions lose — sometimes dramatically. The video shows how to monitor your net vega across all positions and how to hedge or reduce it when it becomes too large.\n\nStrategies for managing volatility exposure include buying straddles as a hedge, reducing position size when IV is elevated, and using ratio spreads to control net vega. The video also covers the concept of 'vol of vol' — the tendency for implied volatility itself to be volatile — and why that matters for anyone running a systematic premium-selling program.",
  46: "Using a trading-strategies lens, this video explains how to use the relationship between implied and historical volatility to select strategies. When IV is significantly above HV, the market is overpaying for options relative to what the stock has historically needed to justify that price — a signal to sell premium. When IV is below HV, options are cheap relative to history — a signal to buy.\n\nThe video walks through specific strategy pairs: sell straddles/strangles when IV is elevated, buy calendars or diagonal spreads when IV is depressed. It also covers how to use the IV/HV ratio as a filter rather than a precise signal, acknowledging that volatility can remain elevated or depressed for extended periods before mean-reverting.",
  47: "This video analyses how changes in implied and historical volatility create P&L impact across different types of options positions — long calls, long puts, covered calls, naked puts, and spreads. It shows, position by position, what happens when IV rises sharply (a volatility spike) and when IV collapses after a catalyst event (volatility crush).\n\nVolatility crush after earnings is given special attention: even if you're right about the direction of the stock's move after an earnings announcement, a collapse in IV can cause the option to lose value. Understanding this dynamic prevents the common mistake of buying options into earnings and watching them lose money despite a correct directional call.",
  48: "A practical video on incorporating implied volatility into your trading decisions, starting with how to find IV data on a brokerage platform and interpret it in context. The video covers IV rank and percentile as the primary tools for assessing whether IV is high or low relative to its own history for a given underlying.\n\nThe video then maps IV levels to strategy selection: high IV favours premium selling (strangles, iron condors, covered calls); low IV favours premium buying (long calls, long puts, long straddles). It closes with a framework for scanning a watchlist by IV rank to find the most attractive opportunities for your preferred strategy type.",
  49: "This video introduces volatility trading as a distinct strategy category — trading the level of volatility itself rather than the direction of the underlying stock. The two primary instruments are straddles (long gamma, long vega, profiting from large moves in either direction) and short straddles (short gamma, short vega, profiting from low realised volatility and premium decay).\n\nThe mechanics of each position are covered in detail: entry timing, profit targets, maximum loss scenarios, and adjustment triggers. The video emphasises that volatility strategies require active management — your risk profile changes dramatically as the underlying moves and as implied volatility shifts — unlike more passive strategies like covered calls.",
  50: "Short straddles and strangles are among the highest-probability income strategies in options, and this video covers them in depth: how to structure them, where to place strikes, how much premium to collect, and how to manage the inevitable losing scenarios. Both strategies profit when the underlying stays within a defined range and IV contracts.\n\nThe critical risk management concepts covered are the break-even points at expiration (premium collected plus/minus the strikes), the maximum loss (theoretically unlimited for short straddles in a single-leg sense), and how to roll positions that move against you. The video is honest about the tail risk in these strategies and the importance of position sizing accordingly.",
  51: "This video categorises volatility strategies by the volatility environment they're designed for: high IV environments (sell straddles, strangles, iron condors to harvest elevated premium) versus low IV environments (buy straddles, calendar spreads, or LEAPS to benefit from cheap options and potential IV expansion).\n\nThe framework provided is a decision tree: check IV rank first, then select the strategy type, then determine optimal strike selection and expiration. This structured approach prevents the common mistake of applying high-IV strategies in low-IV environments (and vice versa), which destroys edge and leads to consistent losses even when the trader is right about direction.",
  52: "Options give you multiple ways to profit from large stock moves, and this video catalogues them: long straddles, long strangles, ratio backspreads, and long calls or puts as directional bets. The key distinction is between delta strategies (you need the stock to move in a specific direction) and vega/gamma strategies (you profit from a large move in either direction).\n\nThe video covers the break-even analysis for each structure — exactly how far the stock needs to move for the trade to be profitable — and how that requirement changes with different IV environments and expirations. Long premium strategies in high-IV environments face a steep hurdle because the market has already priced in a large move; the stock needs to exceed the implied move to profit.",
  53: "The long straddle — buying a call and a put at the same strike — is the purest way to bet on a large stock move without having a directional view. This video covers exactly how to size, enter, and manage a straddle position: choosing the ATM strike, selecting an expiration with adequate time for the move to materialise, and calculating the total premium cost as your maximum risk.\n\nThe management section covers the two ways to profit: a large directional move (one leg profits enough to cover both premiums) or a spike in implied volatility (the vega of both legs increases the position's value). It also covers the critical pitfall: buying a straddle into a high-IV event like earnings, where the subsequent volatility crush can kill the trade even if the stock makes a large move.",
  54: "This foundational video on buying options covers the mechanics, risk profile, and use cases for going long calls and puts. It explains the three outcomes for any long options position: the option expires worthless (maximum loss = premium paid), the option expires slightly in the money (partial loss), or the option moves significantly in the money (profit).\n\nThe video is particularly useful for understanding the role of time as an enemy of long options positions: theta decay works against you every day you hold a long option. This means long options positions require not just being right about direction, but being right within a specific time frame — a constraint that doesn't exist with stock ownership.",
  55: "This video makes the direct comparison between buying 100 shares of stock and buying a call option as a substitute. The call requires far less capital (the premium versus the full stock price), provides the same directional upside above the strike, but loses its entire value if the stock stays below the strike at expiration — whereas the stock always retains some value.\n\nThe analysis includes the break-even calculation, the leverage ratio, and the scenarios where the call outperforms the stock (large move up before expiration) versus where it underperforms (small move, sideways, or down). This comparison crystallises the trade-off between capital efficiency and the cost of optionality that options buyers pay every time they enter a position.",
  56: "Long calls require careful strike selection and attention to moneyness, and this video is dedicated to those decisions. Deep ITM calls have high delta (they move almost like stock) but cost more premium; OTM calls are cheap but have low delta and require a large move to profit. The video provides a framework for choosing between ITM, ATM, and OTM based on your conviction level and time horizon.\n\nTime decay is given detailed treatment, including charts showing how theta impacts ITM, ATM, and OTM calls differently. ATM options suffer the most time decay in dollar terms; deep ITM options have little time value to decay; OTM options have all time value but it decays rapidly as expiration approaches. Matching your strike to your expected timing of the move is as important as the direction call itself.",
  57: "This video is a practical checklist for anyone about to buy their first options contract, covering the common mistakes that cost beginners money. The list includes: buying options that are too far OTM, buying options with too little time (insufficient days to expiration), buying options in high-IV environments where premium is inflated, and buying the wrong expiration cycle.\n\nThe video also covers liquidity considerations — wide bid-ask spreads in illiquid options can cost you a significant portion of your edge before you even have a position — and position sizing, emphasising that options buyers should size positions so that the worst case (premium going to zero) is a manageable dollar loss, not a portfolio-destroying event.",
  58: "The mechanics of entering and exiting options trades are the focus here: the difference between market and limit orders for options, how to use contingent orders to manage exits automatically, and how to read your order status on a brokerage platform. These practical details are essential for executing the strategies you learn in theory videos.\n\nThe video covers the major order types — buy to open, sell to open, buy to close, sell to close — and the importance of using the correct one to avoid accidentally opening unwanted positions. It also covers what happens to open long positions at expiration if you forget to act: auto-exercise for ITM options and the risk of being assigned into a stock position you didn't intend to hold.",
  59: "Selling options is a fundamentally different business than buying them: instead of paying premium and waiting for a move, you collect premium upfront and profit when the option expires worthless. This video introduces the mechanics of selling options — the obligation you take on, the margin required, and the risk profile — to establish the correct mental model for premium sellers.\n\nThe video covers the four basic short positions: short call (bearish or neutral, unlimited risk), short put (bullish or neutral, risk down to stock going to zero), covered call (stock + short call, the most conservative selling strategy), and cash-secured put (cash reserved against potential assignment). Understanding the risk profile of each is essential before moving into income strategies.",
  60: "A key-points summary for options sellers, covering the contractual obligations, margin requirements, and risk management considerations that distinguish selling from buying. When you sell an option, you're not just making a trade — you're underwriting a risk that someone else wants to offload, and understanding what that risk is determines whether the premium you collect is adequate compensation.\n\nThe video addresses the common misconception that selling options is 'safer' than buying them because you collect premium. In reality, selling uncovered options has theoretically unlimited risk, and even covered strategies carry significant risk if the underlying moves sharply. The video builds a clear-eyed framework for evaluating the risk-reward of any selling strategy before entry.",
  61: "This video positions options selling as a systematic investment strategy rather than a speculative activity — a way to generate consistent income by collecting premium in exchange for taking on defined risk. The key insight is that over time, implied volatility consistently overestimates realised volatility, meaning options sellers are structurally compensated for the risk they take.\n\nThe video covers the three main income-generating selling strategies (covered calls, cash-secured puts, and credit spreads) and explains how to construct a diversified premium-selling program that earns income across multiple positions while keeping any single position's risk manageable. This 'options as income' framework is the central strategy for many conservative retail investors.",
  62: "The covered call is the most widely used options strategy and this video covers its mechanics in full: you own 100 shares of stock and sell a call option against them. The premium collected lowers your cost basis and provides a buffer against small price declines, but you cap your upside at the strike price if the stock rallies strongly.\n\nThe video covers strike selection (OTM calls keep more upside; ATM calls generate more premium), expiration selection (monthly vs. weekly), and the two outcomes at expiration: the stock stays below the strike (option expires worthless, you keep the premium and the stock) or the stock rises above the strike (your shares are called away at the strike, you still keep the premium). Understanding both outcomes before you enter ensures there are no surprises.",
  63: "This video presents the covered call as a premium income strategy, framing it as a way to reduce the effective holding cost of a long stock position over time. By systematically selling calls month after month, you can collect meaningful income — potentially 1-3% per month on the stock's value — while still participating in moderate upside.\n\nThe strategy's limitations are discussed honestly: you sacrifice upside in strong bull runs, you're still exposed to all the downside of the underlying stock, and short-term capital gains on called-away shares may be less tax-efficient than long-term capital gains. Despite these trade-offs, covered calls remain one of the most reliable income strategies available to retail investors with existing stock positions.",
  64: "This tutorial-style video walks through a complete covered call trade from start to finish: screening for candidates (high IV stocks you already own or are willing to own), selecting the strike and expiration, placing the order, and managing the position until expiration or roll. The step-by-step format makes it immediately actionable.\n\nManagement scenarios are covered in detail: what to do if the stock rallies toward your short call (consider rolling up and out to capture more premium while extending the trade), what to do if the stock falls (the premium provides a partial buffer, but you may want to close if the thesis changes), and what to do at expiration (let it expire, close early, or roll to the next cycle).",
  65: "Starting from the basics and building to practical strategy execution, this beginner-focused video covers covered calls from the ground up. The core teaching is that selling a covered call changes the risk profile of stock ownership: you give up some upside in exchange for guaranteed income, shifting from a purely directional bet to a range-bound income strategy.\n\nThe video is structured around real examples, with specific stock tickers and option chains used to show how to evaluate a covered call opportunity: is the IV high enough to make the premium attractive? Is the strike far enough OTM that you don't mind being called away? Is the expiration short enough that you're not committing your shares for too long? These three questions guide strike and expiration selection.",
  66: "The Poor Man's Covered Call (PMCC) is a capital-efficient alternative to the traditional covered call: instead of owning 100 shares (which requires full stock purchase price as capital), you buy a deep ITM LEAPS call and sell a shorter-dated OTM call against it. The LEAPS serves as a synthetic stock substitute at a fraction of the capital cost.\n\nThe video covers the risks specific to the PMCC that don't exist in traditional covered calls: the long LEAPS decays in value over time, and if the stock falls sharply, the loss on the LEAPS can exceed the premium collected from selling calls. Position sizing, strike selection for both legs, and the management rules for rolling the short leg are covered in detail to make this strategy executable.",
  67: "The covered combination combines a covered call with a short put on the same underlying: you own stock, sell a call above the current price, and sell a put below it. You collect premium from both options, reducing your cost basis significantly, but you've committed to buying more shares if the stock falls to the put strike.\n\nThis strategy is appropriate when you're bullish on a stock you already own, willing to acquire more shares at a lower price, and want to generate maximum income from the position. The video covers the combined break-even, maximum profit scenario (stock stays between the two strikes at expiration), and the loss scenario (stock falls sharply below the put strike, resulting in a forced purchase at the put strike).",
  68: "Covered combinations — pairing covered calls with short puts — are explained here with particular attention to the mechanics of potential assignment on the put leg. If the stock falls below the short put strike at expiration, you're obligated to buy 100 additional shares at that strike, effectively doubling your position size at a lower price.\n\nThe video evaluates the covered combination as a strategy for stocks you're willing to accumulate: if you're assigned on the put, your average cost basis improves, and you now have a larger covered call position to generate income going forward. This 'wheel strategy' thinking — covered calls into assignment, cash-secured puts, then covered calls again — connects to a broader income-generation framework.",
  69: "Managing covered call positions after entry is where many traders make mistakes, and this video addresses the management phase directly. It covers three key scenarios: the stock rallies sharply (early close or roll up-and-out to avoid assignment), the stock falls (the option premium provides a buffer, but you must decide whether to hold or close based on your thesis), and the stock stays flat (option decays toward zero, you close or roll to the next expiration).\n\nThe decision framework for rolling — when to roll out in time versus roll up in strike versus close entirely — is one of the most practical skills in covered call management. The video provides specific rules for when each action is appropriate, giving you a systematic approach to ongoing position management.",
  70: "This video surveys several covered call variations beyond the standard monthly OTM call: writing shorter-dated weeklies for higher annualised income, writing closer-to-the-money calls for more premium at the cost of upside, and writing calls against recently acquired shares to immediately lower the cost basis. Each variation trades off income against flexibility or capital appreciation potential.\n\nThe video also covers writing covered calls as part of a tax-loss harvesting strategy and the wash-sale rules that apply when options are involved — a compliance consideration that's rarely covered in options trading courses but becomes important when managing a larger portfolio of positions.",
  71: "Adjusting covered calls after entry — particularly in scenarios where the stock moves sharply — is the focus of this video. The key adjustment mechanics covered are: rolling (buy back the current call and sell a new one at a different strike or expiration), closing the entire position (buy back the call, sell the stock), and defending the position by buying a put to protect against further downside.\n\nThe decision tree is practical: if the stock has risen above your short call strike, decide whether to roll up and out (collect more premium, maintain the position) or let it expire and be called away (accept the capped gain and move on). If the stock has fallen significantly, decide whether the premium buffer is sufficient or whether the original thesis has been invalidated.",
  72: "Portfolio overwriting is the institutional-scale application of covered call writing: systematically selling calls against every position in an equity portfolio, generating a consistent income stream from premium across dozens or hundreds of holdings. This video explains the mechanics at portfolio level, including how to determine the optimal call ratio and how to manage the aggregate vega and theta exposure.\n\nThe video is particularly relevant for investors managing large equity portfolios who want to enhance returns in neutral-to-mildly-bullish environments. It covers the trade-off between income generation and index participation — in strong bull markets, the calls get exercised and the portfolio underperforms the index — and how to adjust the strategy when market conditions change.",
  73: "The cash-secured put is the mirror image of the covered call: you sell a put option and set aside enough cash to buy 100 shares at the strike price if you're assigned. You're effectively getting paid to commit to buying a stock you want to own at a lower price than the current market. If the stock stays above the strike, the option expires worthless and you keep the premium.\n\nThe video covers the strategy's risk profile (you're long the stock below the strike — you make money if the stock stays flat or rises, and lose money if it falls below your break-even), its tax treatment (short-term capital gains on premium), and how to select the right strike — typically at a price where you'd genuinely want to own the stock, making the strategy feel more like a limit buy order with built-in income.",
  74: "Premium Income II covers two advanced income strategies: cash-secured puts (explained in detail) and the Wheel Strategy — a systematic approach that chains covered calls and cash-secured puts together in a continuous cycle. In the Wheel, you start by selling cash-secured puts. If assigned, you sell covered calls on the acquired stock. If called away, you start selling puts again.\n\nThe Wheel generates continuous premium income regardless of whether you own stock or hold cash, though it requires active management and performs best in sideways-to-mildly-bullish markets on high-IV stocks. The video is honest about the strategy's weakness in strong downtrends (where assignment at falling strikes leads to mounting unrealised losses) and provides rules for pausing the wheel in bearish environments.",
  75: "This video walks through the mechanics and logic of getting assigned on cash-secured puts — specifically in declining markets where the stock falls through your put strike. Assignment means you buy 100 shares at the strike price regardless of where the stock currently trades, and this video helps you understand that scenario as an intended outcome rather than a failure.\n\nThe framing is useful: a cash-secured put is essentially a limit buy order with income. If you get assigned, you own shares at an effective cost of strike minus premium — often a discount to where the stock was trading when you sold the put. The video covers how to manage the resulting stock position (sell covered calls immediately to continue generating income) and when to accept a loss rather than continuing to sell options on a deteriorating position.",
  76: "Put options can be used to generate income when sold against a cash reserve or an existing portfolio — a strategy that works particularly well on high-quality stocks you'd want to own at a lower price. This video covers the full income-generation workflow using puts: screening for opportunities, selecting strikes and expirations, entering the trade, and managing it to expiration.\n\nThe video covers the income generation math in detail: annualised return on cash deployed, how IV rank affects premium quality, and how to compare put-selling income to dividend income on the same stock. For stocks that pay dividends, combining put selling with eventual share ownership (via assignment) and then covered call writing can generate total returns that significantly exceed buy-and-hold.",
  77: "Put option adjustments — the management actions you take when a short put is challenged by a falling stock price — are the focus here. The key adjustments covered are: rolling down and out (move the put to a lower strike in a later expiration to collect more credit and give the stock room to recover), closing at a loss (accept the loss and redeploy capital), or taking assignment and immediately selling covered calls.\n\nThe decision framework is built around two questions: do you still want to own this stock at the current strike price, and is the premium available from rolling sufficient to justify the additional risk and time? The video provides concrete guidelines for each scenario, turning ad-hoc decisions into a systematic management process.",
  78: "A special event presentation covering premium income strategies with limited risk — specifically credit spreads (bull put spreads and bear call spreads) as an alternative to naked short puts and calls. The limited-risk framing is important: by buying a further OTM option against your short option, you cap your maximum loss at the spread width minus the net premium collected.\n\nThe event format includes audience questions covering real trade examples, which makes the content immediately practical. Topics include how wide to make the spread (wider spreads have higher maximum loss but better risk-reward ratios), which expiration to choose, and how to manage a spread that moves against you. Defined-risk premium selling is the bridge between beginner income strategies and professional-grade spread trading.",
  79: "This video presents three distinct pathways to income generation with options: covered calls (income from stock you own), cash-secured puts (income from cash you hold), and credit spreads (income with defined maximum risk and no stock ownership required). Each approach has different capital requirements, risk profiles, and suitable market conditions.\n\nThe comparison framework helps you choose the right strategy for your current portfolio composition and market outlook. Covered calls work when you own stock and want to generate income while you hold it. Cash-secured puts work when you want to acquire stock at a discount with built-in income. Credit spreads work when you want income without stock ownership and want to define your maximum loss in advance.",
  80: "This video introduces newer and less commonly discussed income generation strategies: jade lizards (short put combined with a bear call spread, with no upside risk), 1-by-2 put spreads, and broken-wing butterflies configured as net credit trades. These are extensions of the core income strategies designed to improve premium collection or reduce risk in specific market environments.\n\nThe video is aimed at intermediate traders who have mastered basic income strategies and are looking to improve their premium-to-risk ratios. Each strategy is explained through its profit/loss diagram, maximum profit, maximum loss, and optimal market conditions. The jade lizard in particular is highlighted as a way to collect more premium than a simple iron condor in stocks with pronounced put skew.",
  81: "Protective puts are the options equivalent of insurance: you own stock and buy a put to cap your downside. If the stock falls below the put strike, your losses are capped at the premium paid plus the distance from current price to the strike. Above the strike, you participate fully in upside. The video explains why investors buy protective puts, how to select the right strike and expiration, and how to evaluate the cost of the insurance relative to the protection provided.\n\nThe put's cost (premium) reduces your effective return on the stock position if the stock doesn't fall, creating the insurance analogy: you're paying a premium every period to protect against a loss you hope never materialises. The video covers the decision between buying ATM puts (expensive, full protection) versus OTM puts (cheaper, deductible-style protection starting from the strike).",
  82: "The collar strategy combines a covered call and a protective put in a single position: you own stock, sell a call above the current price to finance the cost of a put below it. The resulting position has capped upside (at the call strike), protected downside (below the put strike), and a range in the middle where you behave like a stockholder. When structured as a zero-cost collar, the call premium exactly offsets the put premium.\n\nThe video covers collar construction for long-term stockholders who want downside protection without paying out-of-pocket for puts. It explains how to select put and call strikes to achieve the desired risk profile (how much downside protection versus how much upside to preserve) and covers the tax implications of collars on long-term holdings, which are more complex than standard options trades.",
  83: "This detailed video on options collars focuses on the mechanics, use cases, and management of collar positions. The key use case is protecting a large concentrated stock position — a single stock that represents a significant portion of your net worth — against a catastrophic decline without selling the shares (which would trigger a taxable event).\n\nThe video covers both standard collars (paying a net premium for protection) and zero-cost collars (selling enough call premium to fully finance the put), and discusses the trade-offs between them. It also covers variable-ratio collars and collars using LEAPS for longer-term protection, giving you a toolkit for applying collars across different time horizons and portfolio structures.",
  84: "Option collars are given a comprehensive treatment in this video, with particular focus on why they're used and how to evaluate them as a risk management tool. The core insight is that a collar trades upside participation for downside protection — quantifying this trade-off requires understanding the cost of the put, the premium from the call, and the opportunity cost of capping your upside.\n\nThe video covers practical collar construction on a large equity position, walking through the strike selection process step by step. It also addresses the collar's tax profile (collars using near-term options don't change the long-term holding period on the underlying stock under most tax rules) and explains how institutional investors use collars to manage concentrated positions before a lockup expiration.",
  85: "The protective put strategy is explained in full mechanical detail: how to buy a put that acts as a floor under a long stock position, how to calculate the break-even for the combined position, and how to evaluate whether the insurance cost is worth the protection. The video uses clear diagrams showing the P&L at expiration with and without the put.\n\nBeyond basic mechanics, the video covers several practical decisions: whether to buy ATM puts (full protection from current price, higher cost) or OTM puts (cheaper but with a 'deductible' equal to the distance between current price and the strike), whether to buy near-term puts (cheaper but require frequent renewal) or longer-dated LEAPS puts (more expensive upfront but lower annualised cost). Each choice reflects a different cost-versus-protection preference.",
  86: "This video combines two defensive strategies: the protective put (insurance against a falling stock price) and the stock repair strategy (using options to recover from an existing loss without additional capital). The stock repair strategy is particularly valuable: if you own stock at a loss, you can sell two OTM calls and buy one ATM call to create a position that profits from a recovery to your original cost without requiring the stock to return all the way.\n\nBoth strategies are covered with detailed entry and exit rules, and the video shows how to calculate the exact break-even for each. The stock repair strategy is especially useful for investors holding underwater positions who want to recover their cost basis in a sideways-to-mildly-bullish market without adding more capital to a losing trade.",
  87: "This video makes the case for options as a capital-efficiency tool: instead of putting up the full cost of 100 shares to own a stock position, options allow you to gain equivalent (or better) exposure at a fraction of the capital, freeing up the remaining capital for other opportunities. The video walks through several examples comparing the dollar risk of stock versus options positions.\n\nThe key concept is the 'capital at risk' comparison: a deep ITM call may have 80-90 delta and behave almost like stock, but you paid only the option premium rather than the full stock price. The remaining capital can be deployed elsewhere or simply held as a safety margin. This approach to capital allocation — using options to maintain desired market exposure while reducing committed capital — is common among professional money managers.",
  88: "Using the insurance analogy explicitly, this video explains how options function as portfolio insurance: just as you insure your car or home against catastrophic loss by paying a small premium each period, you can insure a stock position by buying protective puts. The insurance framework helps non-options investors understand the value proposition immediately.\n\nThe video covers the insurance cost calculation — annualised premium as a percentage of the insured value — and compares it to the cost of other risk management methods (stop-losses, diversification, position sizing). It makes the case that options insurance is unique in providing guaranteed protection regardless of how fast or large the decline is, unlike stop-losses which can experience slippage in fast markets.",
  89: "Ratio spreads are an advanced hedging tool that can provide asymmetric protection at zero or negative net cost: you buy one put for protection and sell two puts at a lower strike to finance the hedge. This creates a position that's fully protected between the two strikes but exposed to losses below the lower short put strike — you've traded unlimited protection for free protection with a tail risk.\n\nThe video walks through the risk-reward analysis of ratio spreads in detail, explaining when they're appropriate (you want cheap protection and are comfortable with the tail risk below the lower strike) and how to size them correctly. Ratio spreads are commonly used by professional hedgers as a cost-effective alternative to straight put purchases in moderately volatile markets.",
  90: "This video surveys the best options strategies for hedging equity risk, ranking them by cost, effectiveness, and complexity. The strategies covered range from simple (buying protective puts) to complex (options collar, ratio spreads, VIX calls, put spreads on index ETFs) with a clear analysis of when each is most appropriate and what trade-offs you accept.\n\nThe video's key contribution is a decision framework: how much does the hedge cost annually as a percentage of the portfolio? How much of the downside does it protect? At what point does the hedge kick in (immediately, or only after a 10-20% decline)? By comparing these metrics across strategies, you can select the hedge that provides the most protection per dollar of cost for your specific portfolio and risk tolerance.",
  91: "Playing defense with options means actively managing downside risk in your existing portfolio, and this video covers the complete toolkit: protective puts, collars, put spreads (cheaper than single puts), VIX calls (provide protection when volatility spikes, which often coincides with market declines), and cash allocation as a hedge. Each tool is evaluated in the context of the current market environment.\n\nThe video advocates for a dynamic hedging approach rather than permanent insurance: during periods of low implied volatility, protection is cheap and should be considered; during high-volatility periods when protection is expensive, alternative approaches (reducing position size, using defined-risk spreads) may be more cost-effective. Matching hedging strategy to the volatility environment is a key skill of professional risk management.",
