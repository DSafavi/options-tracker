let activeFilter = 'All';

function loadCounts() {
  try { counts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { counts = {}; }
}

function saveCounts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
}

function showTracker() {
  document.getElementById('password-screen').style.display = 'none';
  document.getElementById('tracker-screen').style.display = 'block';
  init();
}

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    localStorage.setItem(AUTH_KEY, '1');
    showTracker();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password';
    document.getElementById('pw-input').select();
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('tracker-screen').style.display = 'none';
  document.getElementById('password-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-input').focus();
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function getCategories() {
  const seen = new Set();
  return VIDEOS.reduce((acc, v) => {
    if (!seen.has(v.category)) { seen.add(v.category); acc.push(v.category); }
    return acc;
  }, []);
}

function getCatStats(cat) {
  const vids = VIDEOS.filter(v => v.category === cat);
  const watched = vids.filter(v => (counts[v.id] || 0) > 0).length;
  return { total: vids.length, watched };
}

function getOverallStats() {
  const watched = VIDEOS.filter(v => (counts[v.id] || 0) > 0).length;
  return { watched, total: VIDEOS.length };
}

function updateOverall() {
  const { watched, total } = getOverallStats();
  const pct = Math.round((watched / total) * 100);
  document.getElementById('stat-watched').textContent = watched;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-bar-pct').textContent = pct + '%';
}

function updateCatHeader(cat) {
  const { watched, total } = getCatStats(cat);
  const pct = Math.round((watched / total) * 100);
  let block = null;
  document.querySelectorAll('.category-block').forEach(el => {
    if (el.dataset.cat === cat) block = el;
  });
  if (!block) return;
  block.querySelector('.cat-watched-count').textContent = `${watched}/${total}`;
  block.querySelector('.cat-bar').style.width = pct + '%';
  const pctLabel = block.querySelector('.cat-bar-label span');
  if (pctLabel) pctLabel.textContent = pct + '%';
}

function increment(id) {
  counts[id] = (counts[id] || 0) + 1;
  saveCounts();
  renderVideoRow(id);
  const cat = VIDEOS.find(v => v.id === id).category;
  updateCatHeader(cat);
  updateOverall();
}

function decrement(id) {
  if ((counts[id] || 0) > 0) {
    counts[id]--;
    saveCounts();
    renderVideoRow(id);
    const cat = VIDEOS.find(v => v.id === id).category;
    updateCatHeader(cat);
    updateOverall();
  }
}

function renderVideoRow(id) {
  const row = document.querySelector(`[data-vid="${id}"]`);
  if (!row) return;
  const c = counts[id] || 0;
  row.className = 'video-row' + (c === 1 ? ' watched-once' : c > 1 ? ' watched-multi' : '');
  row.querySelector('.watch-count').textContent = c;
  row.querySelector('.watch-count').className = 'watch-count' + (c > 0 ? ' has-views' : '');
}

function buildVideoRow(v) {
  const c = counts[v.id] || 0;
  const borderClass = c === 1 ? ' watched-once' : c > 1 ? ' watched-multi' : '';
  const countClass = c > 0 ? ' has-views' : '';
  const desc = DESCRIPTIONS[v.id] || '';
  const paras = desc ? desc.split('\n\n').map(p => `<p>${p}</p>`).join('') : '';
  const hasDesc = paras.length > 0;
  const num = v.id + 1;
  return `
    <div class="video-row${borderClass}" data-vid="${v.id}">
      <span class="video-num">${num}.</span>
      <div class="video-title">
        ${v.url
          ? `<a href="${v.url}" target="_blank" rel="noopener">${v.title}</a>`
          : v.title}
      </div>
      ${hasDesc ? `<button class="desc-toggle" onclick="toggleDesc(${v.id})">what's covered ↓</button>` : ''}
      <span class="watch-count${countClass}">${c}</span>
      <button class="btn-decrement" onclick="decrement(${v.id})" title="Undo">−</button>
      <button class="btn-increment" onclick="increment(${v.id})" title="Mark watched">+</button>
    </div>
    ${hasDesc ? `<div class="video-desc" id="desc-${v.id}">${paras}</div>` : ''}`;
}

const CAT_LETTERS = 'ABCDEFGHIJK';

function buildCategoryBlock(cat, catIndex) {
  const { watched, total } = getCatStats(cat);
  const pct = Math.round((watched / total) * 100);
  const videos = VIDEOS.filter(v => v.category === cat);
  const letter = CAT_LETTERS[catIndex] || '';
  return `
    <div class="category-block" data-cat="${cat}">
      <div class="category-header" onclick="toggleCat(this)">
        <span class="cat-chevron">▶</span>
        <span class="cat-letter">${letter}</span>
        <span class="cat-name">${cat}</span>
        <div class="cat-progress-wrap">
          <div class="cat-bar-label">
            <span>${pct}%</span>
          </div>
          <div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%"></div></div>
        </div>
        <span class="cat-watched-count">${watched}/${total}</span>
      </div>
      <div class="video-list">
        ${videos.map(buildVideoRow).join('')}
      </div>
    </div>`;
}

function toggleCat(header) {
  header.parentElement.classList.toggle('open');
}

function buildFilters(categories) {
  const row = document.getElementById('filter-row');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'All';
  all.onclick = () => setFilter('All');
  row.appendChild(all);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => setFilter(cat);
    row.appendChild(btn);
  });
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  document.querySelectorAll('.category-block').forEach(block => {
    block.style.display = (cat === 'All' || block.dataset.cat === cat) ? '' : 'none';
  });
}

function toggleDesc(id) {
  const panel = document.getElementById('desc-' + id);
  const btn = document.querySelector(`[data-vid="${id}"] .desc-toggle`);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  if (btn) { btn.classList.toggle('open', open); btn.textContent = open ? "what's covered ↑" : "what's covered ↓"; }
}

function confirmReset() {
  if (confirm('Reset all watch counts? This cannot be undone.')) {
    counts = {};
    saveCounts();
    document.querySelectorAll('.video-row').forEach(row => {
      const id = parseInt(row.dataset.vid);
      renderVideoRow(id);
    });
    getCategories().forEach(updateCatHeader);
    updateOverall();
  }
}

function init() {
  loadCounts();
  const categories = getCategories();
  document.getElementById('filter-row').innerHTML = '';
  buildFilters(categories);
  const content = document.getElementById('content');
  content.innerHTML = categories.map((cat, i) => buildCategoryBlock(cat, i)).join('');
  updateOverall();
}

// Auto-login if previously authenticated — must be after all const declarations
if (localStorage.getItem(AUTH_KEY) === '1') {
  showTracker();
}
</script>
</body>
</html>
